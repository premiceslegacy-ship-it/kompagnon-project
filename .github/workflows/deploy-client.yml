name: Deploy — Client Atelier

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: 'Nom du Worker Cloudflare (ex: atelier-weber)'
        required: true
        type: string

jobs:
  deploy:
    name: Build & Deploy ${{ inputs.worker_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/deploy-client.sh ${{ inputs.worker_name }}
