name = "atelier-embeddings"
main = "index.ts"
compatibility_date = "2024-01-01"

# Cron : toutes les heures
[triggers]
crons = ["0 * * * *"]

# Variables d'environnement (valeurs à définir dans le Dashboard Cloudflare)
