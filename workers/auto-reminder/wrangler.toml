name = "kompagnon-auto-reminder"
main = "index.ts"
compatibility_date = "2024-01-01"

# Cron : tous les jours à 8h UTC (9h heure Paris en hiver, 10h en été)
# Ajuster selon le fuseau horaire cible — Workers Cron est toujours en UTC
[triggers]
crons = ["0 7 * * *"]

# Variables d'environnement (valeurs à définir dans le Dashboard Cloudflare)
# Ne pas mettre les vraies valeurs ici — utiliser `wrangler secret put`
#
# wrangler secret put APP_URL
# wrangler secret put CRON_SECRET
